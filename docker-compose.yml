services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: course-schedule-db
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=YourStrong@Password123
    networks:
      - course-network

  api:
    build:
      context: ./N1
      dockerfile: Dockerfile
    container_name: course-schedule-api
    ports:
      - "8080:8080"
    environment:
      - ConnectionStrings__DefaultConnection=Server=db;Database=CourseScheduleDb;User Id=sa;Password=YourStrong@Password123;TrustServerCertificate=True
      - ASPNETCORE_ENVIRONMENT=Development
    depends_on:
      - db
    networks:
      - course-network

networks:
  course-network:
    driver: bridge
